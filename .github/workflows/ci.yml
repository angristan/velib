name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - run: bun install --frozen-lockfile
      - run: bun run cf-typegen:check
      - run: bun run check
      - run: bunx wrangler d1 migrations apply velib --config wrangler.jsonc --local --persist-to /tmp/velib-ci
      - run: bunx wrangler deploy --config wrangler.jsonc --dry-run
